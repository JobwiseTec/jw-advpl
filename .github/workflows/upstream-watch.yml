name: Upstream Watch

# Downstream-only (vive só no branch jobwise). Avisa quando o upstream
# JoniPraia/plugadvpl lança release nova, abrindo uma issue neste fork.
# OBS: schedule só dispara a partir da branch DEFAULT do repo — por isso
# o default do fork é `jobwise`.

on:
  schedule:
    - cron: '0 6 * * 1'   # toda segunda 06:00 UTC (03:00 BRT)
  workflow_dispatch:        # permite rodar manual pela aba Actions

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verifica release nova do upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          UPSTREAM="JoniPraia/plugadvpl"

          # versão atualmente sincronizada no jobwise (placeholder de marca)
          pinned=$(jq -r '.version' .claude-plugin/plugin.json)
          # última release do upstream (fallback: última tag)
          latest=$(gh release view -R "$UPSTREAM" --json tagName -q .tagName 2>/dev/null \
                   || gh api "repos/$UPSTREAM/tags" -q '.[0].name')
          latest="${latest#v}"; pinned="${pinned#v}"
          echo "pinned=$pinned latest=$latest"

          if [ "$pinned" = "$latest" ]; then
            echo "Em dia (v$pinned)."; exit 0
          fi
          # só notifica se o upstream for ESTRITAMENTE maior (evita alarme se o fork estiver à frente)
          newest=$(printf '%s\n%s\n' "$pinned" "$latest" | sort -V | tail -1)
          if [ "$newest" = "$pinned" ]; then
            echo "Fork >= upstream (v$pinned >= v$latest)."; exit 0
          fi

          title="upstream(plugadvpl): nova versão v$latest disponível (jobwise em v$pinned)"
          existing=$(gh issue list -R "${{ github.repository }}" --state open \
                     --search "$title in:title" --json number -q '.[0].number' || true)
          if [ -n "$existing" ]; then
            echo "Issue #$existing já existe."; exit 0
          fi

          # garante o label (idempotente)
          gh label create upstream-sync -R "${{ github.repository }}" \
            -c FBCA04 -d "Sincronização com o upstream plugadvpl" --force >/dev/null 2>&1 || true

          body=$(printf '%s\n' \
            "Upstream **$UPSTREAM** lançou **v$latest** — jobwise está em **v$pinned**." \
            "" \
            "## Sincronizar" \
            '```bash' \
            "cd …/plugins_advpl/plugadvpl" \
            "git checkout main && git fetch upstream && git reset --hard upstream/main && git push origin main" \
            "git -C ../jw-advpl-work merge main   # resolver conflito de marca: manter jw-advpl" \
            "# (rodar pytest/mypy; bump version p/ v$latest nos manifests de marca)" \
            "git -C ../jw-advpl-work push origin jobwise" \
            '```' \
            "" \
            "- [ ] sync main → jobwise (manter jw-advpl em marketplace.json/plugin.json)" \
            "- [ ] bump version p/ v$latest nos manifests de marca" \
            "- [ ] rodar pytest/mypy" \
            "- [ ] revisar se algo do upstream cobre uma melhoria local (atualizar MELHORIAS.md)" \
            "" \
            "Release notes: https://github.com/$UPSTREAM/releases/tag/v$latest")

          gh issue create -R "${{ github.repository }}" -l upstream-sync -t "$title" -b "$body"
          echo "Issue criada para v$latest."
