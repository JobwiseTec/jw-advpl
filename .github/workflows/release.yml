name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # apenas tags semver finais (v0.1.0, v1.2.3)
      # pre-release tags (v0.1.0-rc1, v0.1.0-rc2) NÃO disparam release.yml —
      # elas são tratadas por release-rc.yml (TestPyPI)

permissions:
  contents: write
  id-token: write   # OIDC for Trusted Publisher

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Build wheel + sdist (both from source, not chained)
        # uv build sem flag faz sdist → wheel-from-sdist, mas wheel-from-sdist
        # quebra aqui porque o wheel target tem force-include = "../skills"
        # que so existe no monorepo, nao dentro do sdist extraido. Solucao:
        # construir cada artefato direto da fonte, em passos separados.
        run: |
          cd cli
          uv build --sdist
          uv build --wheel
      - name: Upload wheel + sdist as artifact (for github-release job)
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: cli/dist/*
          if-no-files-found: error
      - name: Publish to PyPI (Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

  verify-pypi:
    # Confere que o release que acabou de subir e funcional do PyPI publico.
    # Pega bugs classicos: build incompleto, deps faltando no wheel, console_script
    # nao registrado, etc. Falha aqui = release foi pra publico quebrado e
    # precisa de yank manual (raro com nosso flow OIDC, mas seguro ter o gate).
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Extrai version do tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Smoke uvx contra PyPI publicado (com retry pra propagacao)
        # PyPI CDN leva 30-60s pra propagar release novo pra todos os mirrors;
        # uvx pode pegar mirror desatualizado e falhar com "no version". Em vez de
        # um sleep fixo + tentativa unica (flaky), poll com backoff: sai assim que
        # a versao resolve (rapido no caso comum) e tolera lag ate ~135s no pior.
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -u
          attempts=6
          delay=20
          echo "Aguarda inicial de propagacao do PyPI..."
          sleep 15
          for i in $(seq 1 "$attempts"); do
            echo "::group::Tentativa $i/$attempts — uvx plugadvpl@${VERSION}"
            if uvx --refresh "plugadvpl@${VERSION}" version \
               && uvx --refresh "plugadvpl@${VERSION}" --help; then
              echo "::endgroup::"
              echo "Smoke OK na tentativa $i (plugadvpl@${VERSION})."
              exit 0
            fi
            echo "::endgroup::"
            if [ "$i" -lt "$attempts" ]; then
              echo "Falhou (provavel lag de propagacao do PyPI). Aguardando ${delay}s..."
              sleep "$delay"
            fi
          done
          echo "::error::Smoke falhou apos $attempts tentativas (plugadvpl@${VERSION})." >&2
          exit 1

  github-release:
    runs-on: ubuntu-latest
    needs: [publish-pypi, verify-pypi]
    steps:
      - uses: actions/checkout@v5
      - name: Download dist artifact from publish-pypi
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
