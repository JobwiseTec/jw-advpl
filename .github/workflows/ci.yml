name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lint-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Validate plugin structure
        working-directory: cli
        run: uv sync && uv run python ../scripts/validate_plugin.py

  lint-code:
    # Escopo incremental: roda em arquivos limpos. Conforme legado for sendo
    # corrigido, adicionar arquivos aqui. Roadmap: issue #17.
    runs-on: ubuntu-latest
    env:
      LINT_FILES: >-
        plugadvpl/__main__.py
        plugadvpl/compile_installer.py
        plugadvpl/compile_parser.py
        plugadvpl/compile_servers.py
        plugadvpl/db.py
        plugadvpl/edit_prw.py
        plugadvpl/ingest.py
        plugadvpl/ingest_ini.py
        plugadvpl/ingest_log.py
        plugadvpl/ingest_rest.py
        plugadvpl/output.py
        plugadvpl/runtime_config.py
        plugadvpl/scan.py
        plugadvpl/tq.py
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
      - name: ruff check
        working-directory: cli
        run: uv sync && uv run ruff check $LINT_FILES
      - name: ruff format --check
        working-directory: cli
        run: uv run ruff format --check $LINT_FILES
      - name: mypy
        working-directory: cli
        run: uv run mypy $LINT_FILES

  test-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - run: cd cli && uv sync --frozen
      - run: cd cli && uv run pytest tests/unit tests/integration -v --cov=plugadvpl --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        with:
          files: cli/coverage.xml
          fail_ci_if_error: false

  bench:
    runs-on: ubuntu-latest
    # Serializa pushes em gh-pages: jobs concorrentes causam race ("remote
    # rejected: gh-pages updated after git pull"). cancel-in-progress=false
    # garante que cada commit registra seu bench, em vez de cancelar.
    concurrency:
      group: bench-gh-pages
      cancel-in-progress: false
    permissions:
      contents: write           # needed to push benchmark data to gh-pages
      pull-requests: write      # needed for comment-on-alert
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
      - run: cd cli && uv sync --frozen
      - run: cd cli && uv run pytest tests/bench --benchmark-only --benchmark-json=output.json
      # uv sync pode tocar timestamp/format de cli/uv.lock — restaura antes
      # do benchmark-action que faz `git switch gh-pages` (falha se houver
      # mudanças não-commitadas em arquivos trackeados).
      - run: git checkout -- cli/uv.lock || true
      - uses: benchmark-action/github-action-benchmark@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tool: pytest
          output-file-path: cli/output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '110%'
          comment-on-alert: true

  smoke-uvx:
    runs-on: ubuntu-latest
    needs: test-cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uvx --from ./cli plugadvpl version
      - run: uvx --from ./cli plugadvpl --help
      # Indexa um fonte ADVPL real do proprio repo (coletadb.tlpp) + roda arch
      # contra o que foi indexado. Cobre o caminho init -> ingest -> query
      # completo num ambiente novo. Usa --root direto na pasta dos fontes.
      # (compile --doctor sai 1 com needs_setup no runner sem advpls/protheus,
      # nao serve pra smoke aqui.)
      - run: uvx --from ./cli plugadvpl --root ./docs/reference-impl init
      - run: uvx --from ./cli plugadvpl --root ./docs/reference-impl ingest
      - run: uvx --from ./cli plugadvpl --root ./docs/reference-impl --format json arch coletadb.tlpp
