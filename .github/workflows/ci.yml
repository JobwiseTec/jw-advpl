name: CI

on:
  pull_request:
  push:
    branches: [main, master]

# Token mínimo por default (auditoria 2026-06-09, A5). O job `bench`
# declara override próprio (contents/pull-requests: write) pro gh-pages.
permissions:
  contents: read

jobs:
  lint-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Validate plugin structure
        working-directory: cli
        run: uv sync && uv run python ../scripts/validate_plugin.py
      - name: Hook smoke (session-start.mjs)
        run: |
          set -e
          # Empty dir: hook deve sair silencioso (exit 0, sem output)
          mkdir -p /tmp/hook-smoke-empty
          cd /tmp/hook-smoke-empty
          out_empty=$(node "$GITHUB_WORKSPACE/hooks/session-start.mjs")
          if [ -n "$out_empty" ]; then
            echo "FAIL: hook em dir vazio nao deveria emitir output: $out_empty"
            exit 1
          fi
          # Dir com .prw: hook deve sair 0 + emitir JSON com hookSpecificOutput
          mkdir -p /tmp/hook-smoke-advpl
          cd /tmp/hook-smoke-advpl
          touch test.prw
          out_advpl=$(node "$GITHUB_WORKSPACE/hooks/session-start.mjs")
          if ! echo "$out_advpl" | grep -q "hookSpecificOutput"; then
            echo "FAIL: hook em dir com .prw nao emitiu hookSpecificOutput: $out_advpl"
            exit 1
          fi
          echo "Hook smoke OK"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: claude plugin validate (schema oficial Anthropic)
        # Roda o validador upstream — schema, duplicate names, path traversal,
        # version mismatches contra plugin.json. Complementa validate_plugin.py
        # (que checa convencoes especificas do plugadvpl).
        run: claude plugin validate .

  lint-code:
    # Escopo incremental: roda em arquivos limpos. Conforme legado for sendo
    # corrigido, adicionar arquivos aqui. Roadmap: issue #17.
    # v0.18.0 — expansão: +13 arquivos (migrate_tlpp + 11 recipes + diff).
    # 29 → 42 dos 33 .py em plugadvpl/ + 11 em migrate_tlpp_recipes/.
    runs-on: ubuntu-latest
    env:
      LINT_FILES: >-
        plugadvpl/__main__.py
        plugadvpl/_skill_catalog.py
        plugadvpl/agent_doctor.py
        plugadvpl/catalog.py
        plugadvpl/cli.py
        plugadvpl/codex_config.py
        plugadvpl/codex_skills.py
        plugadvpl/coletadb_client.py
        plugadvpl/compile.py
        plugadvpl/compile_doctor.py
        plugadvpl/compile_installer.py
        plugadvpl/compile_parser.py
        plugadvpl/compile_probe.py
        plugadvpl/compile_servers.py
        plugadvpl/copilot_instructions.py
        plugadvpl/credentials.py
        plugadvpl/cursor_rules.py
        plugadvpl/db.py
        plugadvpl/doc_writer.py
        plugadvpl/edit_prw.py
        plugadvpl/gemini_skills.py
        plugadvpl/ignore.py
        plugadvpl/ingest.py
        plugadvpl/ingest_ini.py
        plugadvpl/ingest_log.py
        plugadvpl/ingest_poui.py
        plugadvpl/ingest_rest.py
        plugadvpl/ingest_sx.py
        plugadvpl/migrate_tlpp.py
        plugadvpl/migrate_tlpp_diff.py
        plugadvpl/migrate_tlpp_recipes/__init__.py
        plugadvpl/migrate_tlpp_recipes/begin_sequence.py
        plugadvpl/migrate_tlpp_recipes/conout_to_fwlog.py
        plugadvpl/migrate_tlpp_recipes/convert_encoding.py
        plugadvpl/migrate_tlpp_recipes/expand_truncated.py
        plugadvpl/migrate_tlpp_recipes/header_includes.py
        plugadvpl/migrate_tlpp_recipes/json_inline.py
        plugadvpl/migrate_tlpp_recipes/named_args.py
        plugadvpl/migrate_tlpp_recipes/namespace_infer.py
        plugadvpl/migrate_tlpp_recipes/remove_public.py
        plugadvpl/migrate_tlpp_recipes/rename_extension.py
        plugadvpl/migrate_tlpp_recipes/user_function.py
        plugadvpl/output.py
        plugadvpl/parsing/decisions.py
        plugadvpl/parsing/header.py
        plugadvpl/privacy/__init__.py
        plugadvpl/privacy/brdocs.py
        plugadvpl/privacy/buckets.py
        plugadvpl/privacy/config.py
        plugadvpl/privacy/diagnose.py
        plugadvpl/privacy/engine.py
        plugadvpl/privacy/injection.py
        plugadvpl/parsing/ini_audit.py
        plugadvpl/parsing/ini_known_keys.py
        plugadvpl/parsing/ini_report.py
        plugadvpl/parsing/ini_suggest.py
        plugadvpl/parsing/log_report.py
        plugadvpl/parsing/poui.py
        plugadvpl/query.py
        plugadvpl/runtime_config.py
        plugadvpl/scan.py
        plugadvpl/server_components.py
        plugadvpl/tq.py
        plugadvpl/verify.py
        plugadvpl/eval_harness.py
        plugadvpl/dispatch_eval.py
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
      - name: ruff check
        working-directory: cli
        run: uv sync && uv run ruff check $LINT_FILES
      - name: ruff format --check
        working-directory: cli
        run: uv run ruff format --check $LINT_FILES
      - name: mypy
        working-directory: cli
        run: uv run mypy $LINT_FILES

  test-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-2025 pinned: windows-latest migrara silenciosamente
        # de windows-2022 -> windows-2025-vs2026 em 15 jun 2026.
        # Pinar adopta o futuro runner ja, valida hoje em vez de no dia D.
        os: [ubuntu-latest, windows-2025, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python }}
      - run: cd cli && uv sync --frozen
      - run: cd cli && uv run pytest tests/unit tests/integration -v --cov=plugadvpl --cov-report=xml
      - uses: codecov/codecov-action@v7
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        with:
          files: cli/coverage.xml
          fail_ci_if_error: false

  bench:
    runs-on: ubuntu-latest
    # Serializa pushes em gh-pages: jobs concorrentes causam race ("remote
    # rejected: gh-pages updated after git pull"). cancel-in-progress=false
    # garante que cada commit registra seu bench, em vez de cancelar.
    concurrency:
      group: bench-gh-pages
      cancel-in-progress: false
    permissions:
      contents: write           # needed to push benchmark data to gh-pages
      pull-requests: write      # needed for comment-on-alert
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
      - run: cd cli && uv sync --frozen
      - run: cd cli && uv run pytest tests/bench --benchmark-only --benchmark-json=output.json
      # uv sync pode tocar timestamp/format de cli/uv.lock — restaura antes
      # do benchmark-action que faz `git switch gh-pages` (falha se houver
      # mudanças não-commitadas em arquivos trackeados).
      - run: git checkout -- cli/uv.lock || true
      - uses: benchmark-action/github-action-benchmark@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tool: pytest
          output-file-path: cli/output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '110%'
          comment-on-alert: true

  smoke-uvx:
    runs-on: ubuntu-latest
    needs: test-cli
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uvx --from ./cli plugadvpl version
      - run: uvx --from ./cli plugadvpl --help
      # Indexa um fonte ADVPL real do proprio repo (coletadb.tlpp) + roda arch
      # contra o que foi indexado. Cobre o caminho init -> ingest -> query
      # completo num ambiente novo. Usa --root direto na pasta dos fontes.
      # (compile --doctor sai 1 com needs_setup no runner sem advpls/protheus,
      # nao serve pra smoke aqui.)
      - run: uvx --from ./cli plugadvpl --root ./docs/reference-impl init
      - run: uvx --from ./cli plugadvpl --root ./docs/reference-impl ingest
      - run: uvx --from ./cli plugadvpl --root ./docs/reference-impl --format json arch coletadb.tlpp

  secret-scan:
    # Camada 0 (prevencao): varre a arvore de trabalho atras de segredos.
    # --no-git scaneia os arquivos atuais (sem historico) -> deterministico,
    # nao falha por commits antigos. Config + allowlist em .gitleaks.toml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install gitleaks
        run: |
          set -e
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: gitleaks (secret scanning)
        run: gitleaks detect --no-git --redact --config .gitleaks.toml --source . --verbose
