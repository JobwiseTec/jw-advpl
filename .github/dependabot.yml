version: 2
updates:
  - package-ecosystem: pip
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      runtime-deps:
        dependency-type: production
      dev-deps:
        dependency-type: development
    commit-message:
      prefix: "deps"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
